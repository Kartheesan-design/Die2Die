# PDN Configuration for sky130 picorv32

# Define power/ground nets
set_voltage_domain -power VDD -ground VSS

# Define the PDN structure
define_pdn_grid -name "Core" -voltage_domains "Core"

# met1 rails — run under every standard cell row (horizontal)
add_pdn_stripe \
  -layer met1 \
  -width 0.48 \
  -pitch 5.44 \
  -offset 0 \
  -followpins

# met4 vertical stripes — main power stripes
add_pdn_stripe \
  -layer met4 \
  -width 1.6 \
  -pitch 27.2 \
  -offset 13.6

# met5 horizontal stripes
add_pdn_stripe \
  -layer met5 \
  -width 1.6 \
  -pitch 27.2 \
  -offset 13.6

# Connect met1 rails to met4 stripes via vias
add_pdn_connect -layers {met1 met4}

# Connect met4 stripes to met5 stripes
add_pdn_connect -layers {met4 met5}
